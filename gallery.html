<body>
    <main class="site-frame">
        <header class="frame-header">
            <a href="index.html" class="logo-link" aria-label="Niko's homepage">

                        <img src="resources/abt.jpg" alt="Portrait composition">

                        <img src="resources/profile.jpg" alt="Camera and warm light style shot">

                        <img src="resources/abt.jpg" alt="Editorial color mood sample">

                        <img src="resources/profile.jpg" alt="Creative framing sample">

                        <img src="resources/abt.jpg" alt="Monochrome style sample">
